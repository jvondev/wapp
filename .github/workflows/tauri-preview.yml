name: Tauri Preview

on:
  pull_request_target:
    types: [opened, edited, synchronized, reopened]
  issue_comment:
    types: [created, edited]

concurrency:
  group: tauri-preview-${{ github.event.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read
  statuses: read

jobs:
  preview:
    name: Live Tauri Preview
    # Ensure it's a Pull Request and it is open
    if: >
      (github.event.pull_request || github.event.issue.pull_request) &&
      (github.event.pull_request.state == 'open' || github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    steps:
      - name: Permission Guard
        run: |
          SENDER_ASSOC="${{ github.event.sender.author_association }}"
          if [[ ! " OWNER MEMBER COLLABORATOR " =~ " $SENDER_ASSOC " ]]; then
            echo "::error::Unauthorized user association: $SENDER_ASSOC. Only OWNER, MEMBER, or COLLABORATOR can trigger previews."
            exit 1
          fi

      - name: Resolve PR Head SHA
        id: resolve_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            # For issue_comment, we need to fetch the PR head SHA via gh CLI
            PR_SHA=$(gh pr view ${{ github.event.issue.number }} --json headRefOid -q .headRefOid)
            echo "sha=$PR_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.resolve_sha.outputs.sha }}
          persist-credentials: false

      - name: Find Bot Comment
        uses: peter-evans/find-comment@3eae4d37986fb5ba85bfd4246944358a9e0839e9 # v3.1.0
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- tauri-preview-bot-marker -->'

      - name: Check Trigger Condition
        id: check_trigger
        run: |
          TRIGGERED="false"
          COMMENT_BODY="${{ github.event.comment.body || github.event.pull_request.body }}"

          if [[ "$COMMENT_BODY" == *"[x] 🚀 Click here to deploy Live Tauri Preview Session"* ]]; then
            TRIGGERED="true"
          elif [[ "$COMMENT_BODY" == *"/preview"* ]]; then
            TRIGGERED="true"
          fi

          echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT
          echo "Triggered: $TRIGGERED"

      - name: Initialize / Reset Bot Comment (State A)
        if: steps.check_trigger.outputs.triggered != 'true' || steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@713454d665951624a595ef144fe48d0006734262 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            - [ ] 🚀 Click here to deploy Live Tauri Preview Session

            **Status:** `Idle` 😴
          edit-mode: replace

      - name: Stop if not triggered
        if: steps.check_trigger.outputs.triggered != 'true'
        run: |
          echo "Workflow was not triggered by checkbox or keyword. Hanging up."
          exit 0

      - name: Update Comment to State B (Pre-Flight Checks)
        uses: peter-evans/create-or-update-comment@713454d665951624a595ef144fe48d0006734262 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            - [x] 🚀 Click here to deploy Live Tauri Preview Session

            **Status:** `Pre-Flight Checks` 🔍 (Verifying CI compliance...)
          edit-mode: replace

      - name: Status Check Guard
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          echo "Checking status of commit $COMMIT_SHA..."

          # Wait for other checks to complete or fail
          # We check the combined status. 'success' means all passed. 'failure' means at least one failed.
          # 'pending' means some are still running.

          MAX_ATTEMPTS=30
          WAIT_INTERVAL=20

          for ((i=1; i<=$MAX_ATTEMPTS; i++)); do
            STATUS_JSON=$(gh api /repos/${{ github.repository }}/commits/$COMMIT_SHA/status)
            STATE=$(echo "$STATUS_JSON" | jq -r '.state')

            echo "Attempt $i: Combined state is $STATE"

            if [[ "$STATE" == "success" ]]; then
              echo "All CI checks passed."
              exit 0
            elif [[ "$STATE" == "failure" ]]; then
              echo "::error::CI checks failed for this commit. Aborting preview."
              exit 1
            fi

            # If there are NO statuses yet, jq returns null or state is 'pending'
            # We also check Check Runs as they are different from Statuses
            CHECKS_JSON=$(gh api /repos/${{ github.repository }}/commits/$COMMIT_SHA/check-runs)
            FAILED_CHECKS=$(echo "$CHECKS_JSON" | jq -r '.check_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out") | .name')

            if [[ -n "$FAILED_CHECKS" ]]; then
              echo "::error::Failing check runs detected: $FAILED_CHECKS"
              exit 1
            fi

            PENDING_CHECKS=$(echo "$CHECKS_JSON" | jq -r '.check_runs[] | select(.status != "completed" and .name != "Live Tauri Preview") | .name')
            if [[ -z "$PENDING_CHECKS" && "$STATE" != "pending" ]]; then
               # If everything is completed but not success/failure, it might be neutral or skipped
               # We'll treat as success for now if nothing failed, but usually it should be 'success'
               echo "Checks completed with non-failure states."
               exit 0
            fi

            echo "Waiting for checks to complete..."
            sleep $WAIT_INTERVAL
          done

          echo "::error::Timed out waiting for CI checks to complete."
          exit 1

      - name: Handle Guard Failure
        if: failure()
        uses: peter-evans/create-or-update-comment@713454d665951624a595ef144fe48d0006734262 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            - [ ] 🚀 Click here to deploy Live Tauri Preview Session

            **Status:** `Failed` ❌ (Upstream CI checks are failing or timed out. Please fix them before previewing.)
          edit-mode: replace

      - name: Update Comment to State C (Compiling)
        uses: peter-evans/create-or-update-comment@713454d665951624a595ef144fe48d0006734262 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            - [x] 🚀 Click here to deploy Live Tauri Preview Session

            **Status:** `Compiling` ⚙️ (Active system processing and dependency loading...)
          edit-mode: replace

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # webkit2gtk-4.1-dev is required for Tauri 2.0, adding 4.0 hooks as requested if available
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            xvfb x11vnc novnc websockify

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Node Modules Cache
        uses: actions/cache@1bd1e32a3bdc453d9f5ad3573a1d93d92243540 # v4.2.0
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Vite Cache
        uses: actions/cache@1bd1e32a3bdc453d9f5ad3573a1d93d92243540 # v4.2.0
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-vite-${{ hashFiles('**/package-lock.json', '**/vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install Node Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: swatinem/rust-cache@54e2af0a8339c0435fa1de94002eab349a2f15ef # v2.7.3
        with:
          # swatinem/rust-cache handles ~/.cargo and target/
          # Deterministic key is handled internally but we can augment it
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}

      - name: Configure Headless Display Services
        run: |
          # Start Xvfb
          Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

          # Wait for Xvfb to be ready
          sleep 3

          # Start x11vnc
          # -forever keeps it running after disconnect
          # -nopw for no password (secured by tunnel)
          x11vnc -display :99 -forever -nopw -bg -listen localhost -xkb

          # Start noVNC
          # novnc_proxy is the standard command on Ubuntu for novnc package
          # It connects to localhost:5900 and listens on 6080
          /usr/bin/novnc_proxy --vnc localhost:5900 --listen 6080 > /dev/null 2>&1 &

          # Wait for services
          sleep 2

      - name: Start Tauri Application
        run: |
          # npm run dev handles building the sidecar and starting vite+tauri
          DISPLAY=:99 npm run dev > tauri_dev.log 2>&1 &

          # Monitor log for startup
          MAX_RETRIES=60
          for ((i=1; i<=$MAX_RETRIES; i++)); do
            if grep -q "VITE" tauri_dev.log && grep -q "Ready" tauri_dev.log; then
              echo "Tauri dev server is ready."
              break
            fi
            echo "Waiting for Tauri dev server... ($i/$MAX_RETRIES)"
            sleep 5
          done

      - name: Start Dynamic Tunneling (State D)
        id: tunnel
        run: |
          # Use 'bore' as the dynamic tunneling action block/service
          # It's a simple, high-performance TCP tunnel
          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | sudo tar zx -C /usr/local/bin

          # Start bore tunnel for noVNC port (6080)
          # Redirect output to capture the assigned remote port
          bore local 6080 --to bore.pub > bore.log 2>&1 &

          # Wait for tunnel to establish
          sleep 5

          BORE_OUTPUT=$(cat bore.log)
          echo "$BORE_OUTPUT"

          # Extract the remote port
          # Example output: "listening at bore.pub:12345"
          REMOTE_PORT=$(echo "$BORE_OUTPUT" | grep -oP 'bore.pub:\K\d+')

          if [[ -z "$REMOTE_PORT" ]]; then
            echo "::error::Failed to establish tunnel."
            exit 1
          fi

          echo "url=http://bore.pub:$REMOTE_PORT" >> $GITHUB_OUTPUT
          echo "Live link: http://bore.pub:$REMOTE_PORT"

      - name: Update Comment to State D (Active Stream Link)
        uses: peter-evans/create-or-update-comment@713454d665951624a595ef144fe48d0006734262 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            - [x] 🚀 Click here to deploy Live Tauri Preview Session

            **Status:** `Active` ✅

            ### 📺 Live Session Link
            **[Click here to open the Live Preview]( ${{ steps.tunnel.outputs.url }} )**

            **Metadata:**
            - **Commit SHA:** `${{ steps.resolve_sha.outputs.sha }}`
            - **Display:** 1280x1024 (Virtual Framebuffer)

            **📱 Tablet / Viewport Instructions:**
            1. Open the link above in your browser.
            2. If prompted, click "Connect".
            3. Use the sidebar menu in noVNC to toggle "Scaling" if the viewport doesn't fit your screen.
            4. To stop the session, uncheck the checkbox at the top of this comment or close the PR.
          edit-mode: replace

      - name: Keep Alive
        run: |
          # Keep the job running for up to 30 minutes to allow for testing
          # In a real scenario, this might be handled by a long-running service or
          # by specific timeout logic.
          echo "Preview session is active. Waiting 30 minutes before automatic termination..."
          sleep 1800
