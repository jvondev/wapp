name: Tauri Preview

on:
  pull_request:
    types: [opened, edited, synchronized, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: read
  statuses: read

jobs:
  preview:
    name: Live Tauri Preview
    # Job-level guard: only run on open PRs or comments on open PRs
    if: >
      (github.event.pull_request && github.event.pull_request.state == 'open') ||
      (github.event.issue.pull_request && github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    concurrency:
      # Use PR number to ensure one session per PR. New /preview triggers cancel old ones.
      group: tauri-preview-${{ github.event.number || github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Permission Guard
        env:
          SENDER_ASSOC: ${{ github.event.pull_request.author_association || github.event.comment.author_association || github.event.sender.author_association }}
        run: |
          echo "Sender Association: \"$SENDER_ASSOC\""
          if [[ ! " OWNER MEMBER COLLABORATOR " =~ " $SENDER_ASSOC " ]]; then
            echo "::error::Unauthorized user association: \"$SENDER_ASSOC\". Only OWNER, MEMBER, or COLLABORATOR can trigger previews."
            exit 1
          fi

      - name: Debug Event Info
        run: |
          echo "Event Name: \"${{ github.event_name }}\""
          echo "Event Action: \"${{ github.event_action }}\""
          echo "PR Number: \"${{ github.event.pull_request.number || github.event.issue.number }}\""

      - name: Find Bot Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- tauri-preview-bot-marker -->'

      - name: Check Trigger Condition
        id: check_trigger
        env:
          EVENT_BODY: ${{ github.event.comment.body || github.event.pull_request.body }}
        run: |
          TRIGGERED="false"
          # Robust slash command detection. Environment variables prevent Exit Code 127.
          if echo "$EVENT_BODY" | grep -qi "/preview"; then
            TRIGGERED="true"
          fi
          echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT
          echo "Triggered: $TRIGGERED"

      - name: Initialize / Update Bot Comment
        # Provides immediate feedback and establishes a stable comment ID.
        id: init_comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            **Status:** ${{ steps.check_trigger.outputs.triggered == 'true' && '`Preparing environment...` ⚙️' || '`Idle` 😴' }}

            ${{ steps.check_trigger.outputs.triggered != 'true' && '*Tip: Add `/preview` to the PR description or comment `/preview` to deploy.*' || '' }}
          edit-mode: replace

      - name: Set Comment ID
        id: set_comment_id
        run: |
          COMMENT_ID="${{ steps.fc.outputs.comment-id || steps.init_comment.outputs.comment-id }}"
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT

      - name: Stop if not triggered
        if: steps.check_trigger.outputs.triggered != 'true'
        run: |
          echo "Workflow was not triggered by '/preview' keyword. Hanging up."
          exit 0

      - name: Resolve PR Head SHA
        id: resolve_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            # For issue_comment, fetch the PR head SHA via gh CLI
            PR_SHA=$(gh pr view ${{ github.event.issue.number }} --json headRefOid -q .headRefOid)
            echo "sha=$PR_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_sha.outputs.sha }}
          persist-credentials: false

      - name: Update Comment (Pre-Flight Checks)
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.set_comment_id.outputs.comment_id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            **Status:** `🔍 Verifying CI compliance...`
          edit-mode: replace

      - name: Status Check Guard
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          echo "Checking status of commit $COMMIT_SHA..."
          MAX_ATTEMPTS=30
          WAIT_INTERVAL=20

          for ((i=1; i<=$MAX_ATTEMPTS; i++)); do
            # Combined status state
            STATUS_JSON=$(gh api /repos/${{ github.repository }}/commits/$COMMIT_SHA/status)
            STATE=$(echo "$STATUS_JSON" | jq -r '.state')
            echo "Attempt $i: Combined state is $STATE"

            if [[ "$STATE" == "success" ]]; then
              echo "All CI checks passed."
              exit 0
            elif [[ "$STATE" == "failure" ]]; then
              echo "::error::CI checks failed for this commit."
              exit 1
            fi

            # Check individual check-runs
            CHECKS_JSON=$(gh api /repos/${{ github.repository }}/commits/$COMMIT_SHA/check-runs?filter=latest)
            FAILED_CHECKS=$(echo "$CHECKS_JSON" | jq -r '.check_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out") | .name')
            if [[ -n "$FAILED_CHECKS" ]]; then
              echo "::error::Failing check runs detected: $FAILED_CHECKS"
              exit 1
            fi

            PENDING_CHECKS=$(echo "$CHECKS_JSON" | jq -r '.check_runs[] | select(.status != "completed" and .name != "Live Tauri Preview") | .name')
            if [[ -z "$PENDING_CHECKS" && "$STATE" != "pending" ]]; then
               echo "Checks completed with non-failure states."
               exit 0
            fi
            echo "Waiting for checks to complete ($i/$MAX_ATTEMPTS)..."
            sleep $WAIT_INTERVAL
          done
          echo "::error::Timed out waiting for CI checks."
          exit 1

      - name: Handle Guard Failure
        if: failure() && steps.set_comment_id.outputs.comment_id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.set_comment_id.outputs.comment_id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            ❌ **Deployment Failed**

            Upstream CI checks are failing or timed out. Please fix them before previewing.
          edit-mode: replace

      - name: Update Comment (Compiling)
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.set_comment_id.outputs.comment_id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            **Status:** `⚙️ Compiling and booting session...`
          edit-mode: replace

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            xvfb x11vnc novnc websockify

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}

      - name: Build wapp-base sidecar (Debug)
        run: |
          cargo build
          mkdir -p src-tauri/bin
          cp target/debug/wapp-base ../src-tauri/bin/wapp-base-linux
        working-directory: wapp-base/src-tauri

      - name: Configure Headless Display Services
        run: |
          Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          x11vnc -display :99 -forever -nopw -bg -listen localhost -xkb
          /usr/bin/novnc_proxy --vnc localhost:5900 --listen 6080 > /dev/null 2>&1 &
          sleep 2

      - name: Start Tauri Application
        run: |
          DISPLAY=:99 npm run tauri dev -- --no-watch > tauri_dev.log 2>&1 &
          MAX_RETRIES=60
          for ((i=1; i<=$MAX_RETRIES; i++)); do
            if grep -q "VITE" tauri_dev.log && grep -q "Ready" tauri_dev.log; then
              echo "Tauri dev server is ready."
              break
            fi
            echo "Waiting for Tauri dev server... ($i/$MAX_RETRIES)"
            sleep 5
          done

      - name: Start Dynamic Tunneling
        id: tunnel
        run: |
          sudo curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | sudo tar zx -C /usr/local/bin
          bore local 6080 --to bore.pub > bore.log 2>&1 &
          sleep 5
          BORE_OUTPUT=$(cat bore.log)
          echo "$BORE_OUTPUT"
          REMOTE_PORT=$(echo "$BORE_OUTPUT" | grep -oP 'bore.pub:\K\d+')
          if [[ -z "$REMOTE_PORT" ]]; then
            echo "::error::Failed to establish tunnel."
            exit 1
          fi
          echo "url=http://bore.pub:$REMOTE_PORT" >> $GITHUB_OUTPUT

      - name: Update Comment (Active)
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.set_comment_id.outputs.comment_id }}
          body: |
            <!-- tauri-preview-bot-marker -->
            ## 🚀 Tauri Live Preview

            ✅ **Preview session is active!**

            ### 📺 [Click here to open the Live Preview](${{ steps.tunnel.outputs.url }})

            **Metadata:**
            - **Commit SHA:** `${{ steps.resolve_sha.outputs.sha }}`
            - **Expires in:** 15 minutes (session will automatically terminate)

            *Tip: If the viewport doesn't fit, use the sidebar menu in noVNC to toggle "Scaling".*
          edit-mode: replace

      - name: Keep Alive
        run: |
          echo "Preview session is active. Waiting 15 minutes before automatic termination..."
          sleep 900
