name: CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check (frontend)
        run: npx tsc --noEmit
        working-directory: src
      - name: Rust fmt check
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
        working-directory: src-tauri
      - name: Rust clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri
  tauri-check:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run build:app
        env:
          TAURI_ENV_PLATFORM: linux
          TAURI_ENV_SIGNING_PRIVATE_KEY: ""
