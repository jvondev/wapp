name: CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@3922559955c32ee6d0735926581023959535b3d2 # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check (frontend)
        run: npx tsc --noEmit
        working-directory: src
      - name: Rust fmt check
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
        working-directory: src-tauri
      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Rust clippy
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@823057a3287015b1186f8fdef2ca3ddb7a030f00 # v2.7.3
      - name: Build wapp-base for sidecar
        run: cargo build --release
        working-directory: wapp-base/src-tauri
      - name: Prepare sidecars
        run: |
          mkdir -p src-tauri/bin
          cp wapp-base/src-tauri/target/release/wapp-base src-tauri/bin/wapp-base-linux
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri
  tauri-check:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@3922559955c32ee6d0735926581023959535b3d2 # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Rust Cache
        uses: swatinem/rust-cache@823057a3287015b1186f8fdef2ca3ddb7a030f00 # v2.7.3
      - name: Build wapp-base for sidecar
        run: cargo build --release
        working-directory: wapp-base/src-tauri
      - name: Prepare sidecars for build
        run: |
          mkdir -p src-tauri/bin
          cp wapp-base/src-tauri/target/release/wapp-base src-tauri/bin/wapp-base-linux
      - run: npm run build:app
        env:
          TAURI_ENV_PLATFORM: linux
          TAURI_ENV_SIGNING_PRIVATE_KEY: ""
