name: CI
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read
  statuses: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check (frontend)
        run: npx tsc --noEmit
        working-directory: src
      - name: Rust fmt check
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
        working-directory: src-tauri
      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Rust clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}
      - name: Build wapp-base for sidecar
        run: cargo build --release
        working-directory: wapp-base/src-tauri
      - name: Prepare sidecars
        run: |
          mkdir -p src-tauri/bin src-tauri/base-bin
          cp wapp-base/src-tauri/target/release/wapp-base src-tauri/bin/wapp-base-linux
          touch src-tauri/base-bin/.gitkeep
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri
  tauri-check:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}
      - name: Build wapp-base for sidecar
        run: cargo build --release
        working-directory: wapp-base/src-tauri
      - name: Prepare sidecars for build
        run: |
          mkdir -p src-tauri/bin src-tauri/base-bin
          cp wapp-base/src-tauri/target/release/wapp-base src-tauri/bin/wapp-base-linux
          touch src-tauri/base-bin/.gitkeep
      - run: npm run build:app
        env:
          TAURI_ENV_PLATFORM: linux
          TAURI_ENV_SIGNING_PRIVATE_KEY: ""
