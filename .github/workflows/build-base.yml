name: Build wapp-base + Wapp Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1: Build wapp-base for all 3 platforms.
  # This is the base runtime engine bundled inside every Wapp installer.
  # Only re-runs when wapp-base/ source changes.
  # Run this when: first setup, or wapp-base Rust code is updated.
  # ─────────────────────────────────────────────────────────────────────────────
  build-base:
    name: Build wapp-base (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: wapp-base.exe
            artifact: wapp-base-windows

          - os: macos-latest
            binary: wapp-base
            artifact: wapp-base-macos

          - os: ubuntu-latest
            binary: wapp-base
            artifact: wapp-base-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo (wapp-base)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wapp-base/src-tauri/target
          key: wapp-base-${{ matrix.os }}-${{ hashFiles('wapp-base/src-tauri/Cargo.toml') }}

      # tauri.conf.json requires icons — reuse from main Wapp
      - name: Copy Icons into wapp-base (Unix)
        if: matrix.os != 'windows-latest'
        run: cp -r src-tauri/icons wapp-base/src-tauri/icons

      - name: Copy Icons into wapp-base (Windows)
        if: matrix.os == 'windows-latest'
        run: xcopy /E /I src-tauri\icons wapp-base\src-tauri\icons

      # wapp-base has no frontend — needs empty dist-base
      - name: Create empty dist-base (Unix)
        if: matrix.os != 'windows-latest'
        run: mkdir -p wapp-base/dist-base

      - name: Create empty dist-base (Windows)
        if: matrix.os == 'windows-latest'
        run: mkdir wapp-base\dist-base

      - name: Build wapp-base Release Binary
        run: cargo build --release
        working-directory: wapp-base/src-tauri

      - name: Upload wapp-base Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wapp-base/src-tauri/target/release/${{ matrix.binary }}
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2: Build Wapp installers for all 3 platforms.
  # Downloads the matching wapp-base binary → places in src-tauri/base-bin/ →
  # compiles Wapp. Output: ready-to-distribute installers per OS.
  # Formats: .exe + .msi (Win), .dmg (Mac), .deb + .AppImage (Linux)
  # ─────────────────────────────────────────────────────────────────────────────
  build-wapp:
    name: Build Wapp (${{ matrix.os }})
    needs: build-base
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: wapp-base-windows
            binary: wapp-base.exe
            installer-paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

          - os: macos-latest
            artifact: wapp-base-macos
            binary: wapp-base
            installer-paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

          - os: ubuntu-latest
            artifact: wapp-base-linux
            binary: wapp-base
            installer-paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo (Wapp)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: wapp-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Download wapp-base Binary for this OS
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/base-bin

      - name: Make wapp-base Executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/base-bin/${{ matrix.binary }}

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Wapp
        run: npm run tauri build

      - name: Upload Wapp Installer
        uses: actions/upload-artifact@v4
        with:
          name: wapp-installer-${{ matrix.os }}
          path: ${{ matrix.installer-paths }}
          retention-days: 30
