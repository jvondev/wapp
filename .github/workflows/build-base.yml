name: Build and Release Wapp

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────
  # STEP 1: Build pake-base for all OS
  # This is the "engine" - runs once.
  # Only rebuilds if pake-base/ code changes.
  # ─────────────────────────────────────
  build-base:
    strategy:
      matrix:
        include:
          - platform: ubuntu-latest
            binary-name: pake-base
          - platform: macos-latest
            binary-name: pake-base
          - platform: windows-latest
            binary-name: pake-base.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pake-base/src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('pake-base/src-tauri/Cargo.lock') }}

      - name: Build pake-base Release Binary
        run: cargo build --release
        working-directory: pake-base/src-tauri

      - name: Upload pake-base Binary
        uses: actions/upload-artifact@v4
        with:
          name: pake-base-${{ matrix.platform }}
          path: pake-base/src-tauri/target/release/${{ matrix.binary-name }}
          retention-days: 90

  # ─────────────────────────────────────
  # STEP 2: Build Wapp installer (per OS)
  # Downloads the right pake-base binary,
  # places it in base-bin/, then compiles Wapp.
  # ─────────────────────────────────────
  build-wapp:
    needs: build-base
    strategy:
      matrix:
        include:
          - platform: ubuntu-latest
            artifact-name: pake-base-ubuntu-latest
            binary-name: pake-base
          - platform: macos-latest
            artifact-name: pake-base-macos-latest
            binary-name: pake-base
          - platform: windows-latest
            artifact-name: pake-base-windows-latest
            binary-name: pake-base.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-wapp-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Download Correct pake-base Binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: src-tauri/base-bin

      - name: Make Binary Executable (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/base-bin/${{ matrix.binary-name }}

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Wapp
        run: npm run tauri build

      - name: Upload Wapp Installer
        uses: actions/upload-artifact@v4
        with:
          name: wapp-installer-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
