name: Release Base

# Run when wapp-base Rust code changes.
# Compiles the 3 OS binaries and publishes @jvondev/wapp-base to NPM.
# To release: bump version in npm/wapp-base/package.json, commit, then
# go to GitHub Actions -> Release Base -> Run workflow.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'npm/wapp-base/package.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build wapp-base binary for all 3 platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build-base:
    name: Build wapp-base (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: wapp-base.exe
            artifact: wapp-base-windows

          - os: macos-latest
            binary: wapp-base
            artifact: wapp-base-macos

          - os: ubuntu-latest
            binary: wapp-base
            artifact: wapp-base-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wapp-base/src-tauri/target
          key: wapp-base-${{ matrix.os }}-${{ hashFiles('wapp-base/src-tauri/Cargo.toml') }}

      - name: Copy Icons into wapp-base (Unix)
        if: matrix.os != 'windows-latest'
        run: cp -r src-tauri/icons wapp-base/src-tauri/icons

      - name: Copy Icons into wapp-base (Windows)
        if: matrix.os == 'windows-latest'
        run: xcopy /E /I src-tauri\icons wapp-base\src-tauri\icons

      - name: Create empty dist-base (Unix)
        if: matrix.os != 'windows-latest'
        run: mkdir -p wapp-base/dist-base

      - name: Create empty dist-base (Windows)
        if: matrix.os == 'windows-latest'
        run: mkdir wapp-base\dist-base

      - name: Build Release Binary
        run: cargo build --release
        working-directory: wapp-base/src-tauri

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wapp-base/src-tauri/target/release/${{ matrix.binary }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish all 3 binaries as @jvondev/wapp-base to NPM
  # Requires NPM_TOKEN in GitHub Secrets
  # ─────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to NPM
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Download Windows Base
        uses: actions/download-artifact@v4
        with:
          name: wapp-base-windows
          path: npm/wapp-base/bin

      - name: Download Mac Base
        uses: actions/download-artifact@v4
        with:
          name: wapp-base-macos
          path: npm/wapp-base/bin

      - name: Download Linux Base
        uses: actions/download-artifact@v4
        with:
          name: wapp-base-linux
          path: npm/wapp-base/bin

      - name: Publish @jvondev/wapp-base
        run: npm publish --access public
        working-directory: npm/wapp-base
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
