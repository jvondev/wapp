name: Release App

# Run when you want to ship a new Wapp installer to users.
# Downloads wapp-base binaries from NPM, bundles them, and
# produces .exe/.msi (Win), .dmg (Mac), .deb/.AppImage (Linux).
# Trigger: workflow_dispatch or push a release tag

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build Wapp installer for all 3 platforms.
  # Uses @jvondev/wapp-base from NPM — no Rust compile needed for the engine!
  # ─────────────────────────────────────────────────────────────────────────────
  build-wapp:
    name: Build Wapp (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: wapp-base.exe
            installer-paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

          - os: macos-latest
            binary: wapp-base
            installer-paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

          - os: ubuntu-latest
            binary: wapp-base
            installer-paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo (Wapp)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: wapp-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install NPM Dependencies (includes @jvondev/wapp-base)
        run: npm ci

      - name: Copy wapp-base binary to base-bin
        run: |
          mkdir -p src-tauri/base-bin
          cp node_modules/@jvondev/wapp-base/bin/${{ matrix.binary }} src-tauri/base-bin/
        shell: bash

      - name: Make wapp-base Executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/base-bin/${{ matrix.binary }}

      - name: Build Wapp
        run: npm run build

      - name: Upload Wapp Installer
        uses: actions/upload-artifact@v4
        with:
          name: wapp-installer-${{ matrix.os }}
          path: ${{ matrix.installer-paths }}
          retention-days: 30
